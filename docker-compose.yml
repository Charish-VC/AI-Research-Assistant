services:
  ollama:
    image: ollama/ollama:latest
    container_name: airip-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G

  app:
    build: .
    container_name: airip-app
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - ENVIRONMENT=development
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  ollama_data:
